<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  
  <!-- Accent bar left -->
  <rect width="8" height="630" fill="#2563eb"/>
  
  <!-- Brand name -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f172a">
    Jonchalant
  </text>
  
  <!-- Main headline -->
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#0f172a" width="800">
    Executive Presence
  </text>
  <text x="50" y="270" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#2563eb">
    Coaching for Introverts
  </text>
  
  <!-- Divider -->
  <line x1="50" y1="310" x2="950" y2="310" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Achievement metric -->
  <text x="50" y="360" font-family="Arial, sans-serif" font-size="18" fill="#64748b">
    Transform your presence in 8-12 weeks
  </text>
  
  <!-- Bottom CTA -->
  <text x="50" y="580" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2563eb">
    Learn More at Jonchalant.com
  </text>
  
  <!-- Decorative element -->
  <circle cx="1050" cy="150" r="80" fill="#f97316" opacity="0.1"/>
</svg>
