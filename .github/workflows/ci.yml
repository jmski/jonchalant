name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          # Stub values — only the schema's required fields. Optional integrations
          # (Sentry, GA, Stripe, Resend, Anthropic) intentionally omitted so the
          # build path that gracefully degrades is exercised.
          NEXT_PUBLIC_SANITY_PROJECT_ID: ci-stub
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SUPABASE_URL: https://ci-stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-stub-key
        run: npm run build
